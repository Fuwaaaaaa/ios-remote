# cargo-deny configuration. Soft-fail in CI: surfaces drift without
# blocking merges so the team can act on findings during normal review.
# Tighten thresholds (or flip the CI job to required) once the workspace
# is clean for a few releases.

[graph]
all-features = true

[advisories]
# `cargo audit` is the authoritative advisory gate (separate CI job).
# This block stays minimal so deny doesn't double-warn.
yanked = "warn"
ignore = []

[licenses]
# Permissive set we know we ship under. Add new licenses here once a real
# dependency forces the question — silent expansion makes auditing harder.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
