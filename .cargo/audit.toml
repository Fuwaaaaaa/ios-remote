# cargo-audit configuration.
#
# CI runs `cargo audit --deny warnings` so any new advisory blocks the
# build. The list below is for advisories we have triaged and decided
# to live with — typically because there is no upstream fix available
# and the impact is informational (unmaintained) rather than a CVE.
# Re-evaluate this list whenever upstream releases an update or the
# advisory is amended.

[advisories]
ignore = [
    # `instant` — unmaintained crate.
    # Pulled in transitively by `minifb 0.28.0` (the display window
    # backend). minifb 0.28 is the latest release as of 2026-04-27;
    # the upstream project is still active but has not yet swapped
    # `instant` for `web-time`. No CVE, no exploit path on Windows
    # (we don't run in WASM where `instant`'s wall-clock concerns
    # would apply). Track upstream:
    #   https://github.com/emoon/rust_minifb/issues
    "RUSTSEC-2024-0384",

    # `paste` — unmaintained proc-macro crate (declarative paste).
    # Pulled in transitively by `image 0.25.x` -> `ravif` -> `rav1e`
    # via the `avif` feature. We intentionally trimmed `avif` from
    # ios-remote's direct `image` dependency, but Cargo's feature
    # unification re-enables it because `arboard`, `elgato-streamdeck`,
    # and `rqrr` all depend on `image` with default features. There is
    # no way to opt out without forking those crates. `paste` is a
    # mature, frozen proc-macro with no known soundness or security
    # issues; the advisory is purely "the maintainer stopped releasing
    # new versions". Re-evaluate when `image` 0.26+ ships or when one
    # of the transitive consumers drops `image`.
    "RUSTSEC-2024-0436",
]
