name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build + test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build (default features)
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Clippy — deny warnings on all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --check

      - name: Build with lua feature
        run: cargo build --locked --features lua

      - name: Build with stream_deck feature
        run: cargo build --locked --features stream_deck

      - name: Build with experimental feature (quarantined scaffolds)
        run: cargo build --locked --features experimental

  whisper:
    name: Build with whisper feature (Windows + LLVM)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: whisper

      # whisper-rs-sys needs libclang/llvm to bindgen the whisper.cpp headers.
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17.0"

      - name: Build with whisper feature
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/bin
        run: cargo build --locked --features whisper

  audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # soft-fail: surface advisories, don't block merges
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings

  deny:
    name: cargo deny (licenses + bans + sources)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # soft-fail: surface drift, don't block merges
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
