name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build + test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build (default features)
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Clippy — deny warnings on all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --check

      - name: Build with lua feature
        run: cargo build --locked --features lua

      - name: Build with stream_deck feature
        run: cargo build --locked --features stream_deck

      # `whisper` feature pulls whisper-rs-sys which needs libclang. A dedicated
      # build job with llvm setup can be added when we start shipping binaries
      # with that feature enabled.

  audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # soft-fail: surface advisories, don't block merges
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings
