name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build + test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build (default features)
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Clippy — deny warnings on all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --check

      - name: Build with lua feature
        run: cargo build --locked --features lua

      - name: Build with stream_deck feature
        run: cargo build --locked --features stream_deck

      - name: Build with experimental feature (quarantined scaffolds)
        run: cargo build --locked --features experimental

      - name: Build with audio_capture feature (WASAPI loopback)
        run: cargo build --locked --features audio_capture

  whisper:
    name: Build with whisper (LLVM, libclang)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: whisper

      - name: Install LLVM (for whisper-rs-sys / bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Build with whisper feature
        run: cargo build --locked --features whisper
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # soft-fail: surface advisories, don't block merges
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings
